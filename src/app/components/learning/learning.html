<div class="learning-container">
  <header class="learning-header">
    <button class="btn-icon-back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"></path></svg>
      Kembali
    </button>
    <div class="level-indicator">
      <span class="level-title">Belajar - Level 3</span>
      <div class="steps">
        <div class="step completed">1</div>
        <div class="step-line"></div>
        <div class="step completed">2</div>
        <div class="step-line"></div>
        <div class="step active">3</div>
        <div class="step-line"></div>
        <div class="step">4</div>
        <div class="step-line"></div>
        <div class="step">5</div>
      </div>
    </div>
    <button class="btn-exit">
      Keluar
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
    </button>
  </header>

  <main class="practice-area">
    <div class="instruction">
      <h2>Latihan: Huruf S dan L</h2>
      <p>Ketik huruf berikut:</p>
    </div>

    <div class="char-focus-row">
      <div class="char-box active">S</div>
      <div class="char-box">s</div>
      <div class="char-box">s</div>
      <div class="char-box">l</div>
      <div class="char-box">l</div>
      <div class="char-box">s</div>
      <div class="char-box">l</div>
      <div class="char-box">s</div>
      <div class="char-box">l</div>
    </div>

    <div class="visual-guide">
      <!-- Left Hand -->
      <div class="hand left-hand">
        <svg width="120" height="150" viewBox="0 0 100 120" class="hand-svg">
          <path d="M10 100 Q 10 50 20 40 T 30 20 T 40 40 T 50 15 T 60 40 T 70 30 T 80 60 L 90 110" fill="none" stroke="#64748b" stroke-width="2"/>
          <circle cx="45" cy="18" r="4" fill="#818cf8" class="finger-active"/> <!-- Ring finger for S -->
        </svg>
      </div>

      <!-- Virtual Keyboard -->
      <div class="virtual-keyboard">
        <div class="kbd-row">
          <div class="key">Q</div><div class="key">W</div><div class="key">E</div><div class="key">R</div><div class="key">T</div><div class="key">Y</div><div class="key">U</div><div class="key">I</div><div class="key">O</div><div class="key">P</div>
        </div>
        <div class="kbd-row">
          <div class="key">A</div><div class="key highlighted">S</div><div class="key">D</div><div class="key">F</div><div class="key">G</div><div class="key">H</div><div class="key">J</div><div class="key">K</div><div class="key highlighted secondary">L</div><div class="key">;</div>
        </div>
        <div class="kbd-row">
          <div class="key">Z</div><div class="key">X</div><div class="key">C</div><div class="key">V</div><div class="key">B</div><div class="key">N</div><div class="key">M</div><div class="key">,</div><div class="key">.</div><div class="key">/</div>
        </div>
      </div>

      <!-- Right Hand -->
      <div class="hand right-hand">
        <svg width="120" height="150" viewBox="0 0 100 120" class="hand-svg hand-mirror">
          <path d="M10 100 Q 10 50 20 40 T 30 20 T 40 40 T 50 15 T 60 40 T 70 30 T 80 60 L 90 110" fill="none" stroke="#64748b" stroke-width="2"/>
          <circle cx="45" cy="18" r="4" fill="#a78bfa" class="finger-hint"/> <!-- Ring finger for L -->
        </svg>
      </div>
    </div>
  </main>

  <footer class="practice-footer">
    <div class="practice-stats">
      <div class="p-stat">
        <span class="p-label">Waktu</span>
        <span class="p-value">01:25</span>
      </div>
      <div class="p-stat">
        <span class="p-label">Akurasi</span>
        <span class="p-value">96%</span>
      </div>
      <div class="p-stat">
        <span class="p-label">Kesalahan</span>
        <span class="p-value">2</span>
      </div>
      <div class="p-progress-container">
        <div class="p-label">Progress: 12 / 20</div>
        <div class="p-bar"><div class="p-fill" style="width: 60%"></div></div>
      </div>
    </div>
    <button class="btn-hint">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
      Petunjuk
    </button>
  </footer>
</div>
