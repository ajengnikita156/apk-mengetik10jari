<div class="stats-container">
  <header class="stats-header">
    <button class="btn-icon-back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"></path></svg>
      Kembali
    </button>
    <div class="stats-title">Hasil Tes</div>
    <button class="btn-share">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
      Bagikan
    </button>
  </header>

  <main class="stats-content">
    <div class="result-summary glass">
      <div class="congrats-text">
        <h2>Bagus! 🎉</h2>
        <p>Kamu telah menyelesaikan tes.</p>
      </div>

      <div class="main-metrics">
        <div class="m-metric">
          <span class="m-label">WPM</span>
          <span class="m-value purple">72</span>
        </div>
        <div class="m-metric">
          <span class="m-label">Akurasi</span>
          <span class="m-value green">96%</span>
        </div>
        <div class="m-metric">
          <span class="m-label">Kesalahan</span>
          <span class="m-value red">3</span>
        </div>
      </div>

      <div class="sub-metrics">
        <div class="s-metric">
          <span class="s-label">Karakter</span>
          <span class="s-value">180</span>
        </div>
        <div class="s-metric">
          <span class="s-label">Kata</span>
          <span class="s-value">36</span>
        </div>
        <div class="s-metric">
          <span class="s-label">Waktu</span>
          <span class="s-value">1:00</span>
        </div>
      </div>

      <div class="result-actions">
        <button class="btn-primary-rect">Ulangi Tes</button>
        <button class="btn-secondary-rect">Kembali ke Beranda</button>
      </div>
    </div>

    <div class="history-card glass">
      <div class="history-header">
        <h3>Statistik</h3>
        <div class="period-tabs">
          <span class="p-tab active">Ringkasan</span>
          <span class="p-tab">Harian</span>
          <span class="p-tab">Mingguan</span>
          <span class="p-tab">Bulanan</span>
        </div>
      </div>

      <div class="history-summary-grid">
         <div class="h-item">
           <span class="h-label">WPM Terbaik</span>
           <span class="h-value">72</span>
         </div>
         <div class="h-item">
           <span class="h-label">Akurasi Terbaik</span>
           <span class="h-value green">98%</span>
         </div>
         <div class="h-item">
           <span class="h-label">Tes Selesai</span>
           <span class="h-value">24</span>
         </div>
         <div class="h-item">
           <span class="h-label">Streak</span>
           <span class="h-value red">7 hari</span>
         </div>
      </div>

      <div class="chart-container">
        <div class="chart-title">Perkembangan WPM</div>
        <svg width="100%" height="150" viewBox="0 0 400 100" preserveAspectRatio="none">
          <path d="M0 80 L50 60 L100 70 L150 45 L200 55 L250 35 L300 45 L350 25 L400 15" fill="none" stroke="#818cf8" stroke-width="3" stroke-linecap="round"/>
          <path d="M0 80 L50 60 L100 70 L150 45 L200 55 L250 35 L300 45 L350 25 L400 15 V100 H0 Z" fill="url(#grad)" opacity="0.1"/>
          <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0" />
            </linearGradient>
          </defs>
        </svg>
        <div class="chart-labels">
          <span>1 Mei</span>
          <span>8 Mei</span>
          <span>15 Mei</span>
          <span>22 Mei</span>
          <span>29 Mei</span>
        </div>
      </div>
    </div>
  </main>
</div>
