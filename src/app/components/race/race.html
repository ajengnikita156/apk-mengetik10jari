<div class="race-container">
  <header class="race-header">
    <button class="btn-icon-back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"></path></svg>
      Kembali
    </button>
    <div class="race-title">Balapan - vs Bot (Normal)</div>
    <button class="btn-exit">
      Keluar
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
    </button>
  </header>

  <main class="race-track-area">
    <div class="track-timer">00:30</div>

    <div class="tracks">
      <div class="track-item">
        <div class="track-label">Kamu</div>
        <div class="track-lane">
          <div class="track-car" style="left: 72%">
             <svg width="40" height="24" viewBox="0 0 24 24" fill="#818cf8"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-1.1 0-2 .9-2 2v4c0 1.1.9 2 2 2h2"></path><circle cx="7" cy="17" r="2"></circle><circle cx="17" cy="17" r="2"></circle></svg>
          </div>
          <div class="track-progress purple" style="width: 72%"></div>
          <div class="finish-line">🏁</div>
        </div>
        <div class="track-percent">72%</div>
      </div>

      <div class="track-item">
        <div class="track-label">Bot (Easy)</div>
        <div class="track-lane">
          <div class="track-car" style="left: 58%">
             <svg width="40" height="24" viewBox="0 0 24 24" fill="#10b981"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-1.1 0-2 .9-2 2v4c0 1.1.9 2 2 2h2"></path><circle cx="7" cy="17" r="2"></circle><circle cx="17" cy="17" r="2"></circle></svg>
          </div>
          <div class="track-progress green" style="width: 58%"></div>
          <div class="finish-line">🏁</div>
        </div>
        <div class="track-percent">58%</div>
      </div>
    </div>

    <div class="race-input-section">
      <div class="race-tip">"Jangan pernah menyerah dan teruslah berlatih setiap hari untuk hasil yang lebih baik."</div>
      <textarea class="race-textarea" placeholder="Ketik di sini..."></textarea>
    </div>
  </main>
</div>
