<div class="app-layout">
  <app-sidebar (screenChange)="setScreen($any($event))"></app-sidebar>
  
  <main class="main-content">
    <app-dashboard *ngIf="currentScreen === 'home'"></app-dashboard>
    <app-learning *ngIf="currentScreen === 'learning'"></app-learning>
    <app-typing-test *ngIf="currentScreen === 'typing-test'"></app-typing-test>
    <app-race *ngIf="currentScreen === 'race'"></app-race>
    <app-stats *ngIf="currentScreen === 'stats'"></app-stats>
  </main>
</div>

<router-outlet />
